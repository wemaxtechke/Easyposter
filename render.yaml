# Render Blueprint - deploy both services from this repo
# https://render.com/docs/blueprint-spec
#
# Deploy: Push to GitHub, then in Render Dashboard → New → Blueprint,
# connect your repo. Deploy backend first, then set VITE_API_URL in the
# frontend service to your backend URL (e.g. https://easyposter-api.onrender.com).

services:
  # Backend API
  - type: web
    name: easyposter-api
    runtime: node
    region: oregon

    rootDir: backend
    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Frontend (Static Site)
  - type: web
    name: easyposter
    runtime: static

    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    # SPA: serve index.html for all routes so React Router works
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    # Set VITE_API_URL to your backend URL after first deploy
    # (e.g. https://easyposter-api.onrender.com)
    envVars:
      - key: VITE_API_URL
        sync: false
